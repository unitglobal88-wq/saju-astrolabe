name: Build & Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install
      
      - name: Build static site
        run: npm run build
      
      - name: Deploy via SSH
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          REMOTE_HOST: 147.93.78.105
          REMOTE_PORT: 65002
          REMOTE_USER: u472743573
          TARGET: /home/u472743573/domains/chogitech.com/public_html
          SOURCE: out/
          ARGS: -avz --delete
          SCRIPT_BEFORE: |
            mkdir -p /home/u472743573/domains/chogitech.com/public_html
